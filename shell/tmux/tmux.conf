# ~/.tmux.conf

# List of plugins
#   - Ctrl b + I 可以看到是否安裝成功
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'




# 設置終端類型為 256 色
# 優先使用 tmux-256color terminfo, 沒有會 fallback 到 screen-256color
# tmux-256color 支援斜體及 true color
# 安裝方式: sudo apt install ncurses-term
if-shell 'infocmp tmux-256color > /dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"; set -as terminal-overrides ",*:Tc"' \
  'set -g default-terminal "screen-256color"; display-message "tmux-256color not found, using screen-256color. Install: sudo apt install ncurses-term"'


# 狀態列 左邊: session 名 + git branch
set -g status-left '#S #(cd #{pane_current_path}; git branch --show-current 2>/dev/null) '
set -g status-left-length 80
# 狀態列 右邊: 視窗大小 + 主機名 + 日期時間
set -g status-right '#{client_width}x#{client_height} #H %Y-%m-%d %H:%M (%a)'
set -g status-right-length 60
set -g status-interval 5


# 讓 "|" 符號可以建立 直立 的分割視窗 (同 % 功能)
bind | split-window -h

# 讓你方便選取完後，先按 Ctrl-S 將剛剛選取的內容存至 clipboard
# Ctrl-V 可以直接在 Tmux 上貼上

# 用鍵盤複製文字
# https://unix.stackexchange.com/questions/131011/use-system-clipboard-in-vi-copy-mode-in-tmux
# Ctrl+b [ -> space 開始 -> 選取文字 -> y 複制


# Wayland 環境: 用 wl-copy / wl-paste
if-shell '[ "$XDG_SESSION_TYPE" = "wayland" ]' \
  'bind -n C-s run "tmux save-buffer - | wl-copy" \; display-message "Copied"'
if-shell '[ "$XDG_SESSION_TYPE" = "wayland" ]' \
  'bind -n C-v run "tmux set-buffer \"$(wl-paste)\"; tmux paste-buffer" \; display-message "Pasted"'
if-shell '[ "$XDG_SESSION_TYPE" = "wayland" ]' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"'

# X11 環境: 用 xclip
if-shell '[ "$XDG_SESSION_TYPE" != "wayland" ]' \
  'bind -n C-s run "tmux save-buffer - | xclip -selection clipboard > /dev/null" \; display-message "Copied"'
if-shell '[ "$XDG_SESSION_TYPE" != "wayland" ]' \
  'bind -n C-v run "tmux set-buffer \"$(xclip -o)\"; tmux paste-buffer" \; display-message "Pasted"'
if-shell '[ "$XDG_SESSION_TYPE" != "wayland" ]' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'


# 設置狀態欄前景及背景色
# set -g status-bg colour23
# set -g status-fg colour238

#
# 用 滑鼠+鍵盤 複製文字
#   按住 Shift 再用滑鼠選取文字 -> Ctrl + Shift + c
set -g mouse on

# scrollback buffer 預設 2000 行，加大到 50000 行方便查看長 log
set -g history-limit 50000

#
# for mouse scroll
#
#bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
#bind -n WheelDownPane select-pane -t= \; send-keys -M




# 請執行 > tmux source ~/.tmux.conf
# 然後用 Ctrl + b (prefix) 再按 `I` 來安裝
run -b '~/.tmux/plugins/tpm/tpm'
